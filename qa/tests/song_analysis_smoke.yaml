name: Song Analysis - Smoke

base_url: "http://frontend:5173"

steps:
  - goto: "/"

  - expect:
      text:
        css: "[data-testid='ws-status']"
        equals: "connected"
        timeout: 15000

  - expect:
      text:
        css: "[data-testid='sync-status']"
        equals: "Connected"
        timeout: 15000

  - expect:
      visible:
        css: "[data-testid='song-card']"

  - click:
      role: "button"
      name: "Song Analysis"

  - expect:
      visible:
        css: "[data-testid='song-analysis-page']"

  - expect:
      count:
        css: "[data-testid='song-analysis-column']"
        equals: 3

  - expect:
      texts:
        css: "[data-testid='song-analysis-column-title']"
        equals: ["Beats", "Sections", "Detections"]
