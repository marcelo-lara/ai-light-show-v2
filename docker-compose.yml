services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend/songs:/app/songs
      - ./backend/cues:/app/cues
      - ./backend/metadata:/app/metadata
    environment:
      - DMX_NODE_IP=192.168.10.221
      - FPS=60
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  worker:
    build:
      context: ./analyzer
    entrypoint: ["python", "-m", "song_analyzer.cli", "listen"]
    command: ["--start-worker"]
    user: "1000:1000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
      - ./backend/songs:/app/songs
      - analyzer_model_cache:/app/.cache
      - ./backend/metadata:/app/metadata
      - ./analyzer/temp_files:/app/temp_files
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app/backend:/app
      - CELERY_IMPORTS=tasks.analyze
      - CELERY_WORKER_ARGS=-A tasks.celery_app.celery_app worker --loglevel=info --concurrency=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - NUMBA_DISABLE_JIT=1
      - NUMBA_CACHE_DIR=/app/.cache/numba
      - XDG_CACHE_HOME=/app/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  analyzer_model_cache: