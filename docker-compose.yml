services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_WS_HOST=localhost:5001
    depends_on:
      - backend
    restart: unless-stopped

  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llm-server
    ports:
      - "8080:8080"
    volumes:
      - ./llm-server/models:/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: >
      -m /models/Phi-3.5-mini-instruct.Q4_K_M.gguf
      --host 0.0.0.0 --port 8080
      --ctx-size 4096
      --threads 8
      --n-gpu-layers 999

  agent-gateway:
    build: ./llm-server/agent-gateway
    container_name: agent-gateway
    ports:
      - "8090:8090"
    environment:
      - LLM_BASE_URL=http://llm-server:8080
      - MCP_BASE_URL=http://backend:5001/mcp
    depends_on:
      - backend

  analyzer:
    build: ./analyzer
    ports:
      - "8100:8100"
    volumes:
      - ./analyzer:/app/analyzer
      - ./backend/songs:/app/songs
      - ./analyzer/meta:/app/meta
      - analyzer_cache:/root/.cache
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - ANALYZER_PORT=8100
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/songs:/app/songs
      - ./backend/fixtures:/app/fixtures
      - ./backend/cues:/app/cues
      - ./analyzer/meta:/app/meta
    environment:
      - DMX_NODE_IP=192.168.10.221
      - FPS=60
      - DEBUG_MODE=${DEBUG_MODE:-0}
      - AGENT_GATEWAY_URL=http://agent-gateway:8090
      - ANALYZER_BASE_URL=http://analyzer:8100
      - ASSISTANT_LOG_DIR=/app/logs/assistant
    restart: unless-stopped

volumes:
  analyzer_cache:
